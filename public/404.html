<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 - Page Not Found</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="robots" content="noindex">
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 text-center">
    <h1 class="text-6xl font-extrabold">404</h1>
    <h2 class="mt-6 text-3xl font-extrabold">Page Not Found</h2>
    <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">The page you are looking for does not exist.</p>
    <a href="/" class="inline-block mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Back to Home</a>
  </div>
</body>
</html>
