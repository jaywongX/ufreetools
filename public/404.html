<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="/src/main.js"></script> <!-- 可选：加载你的 Vue 应用 -->
  <link rel="stylesheet" href="/assets/index.css"> <!-- 如果你有 CSS 入口 -->
</head>
<body>
  <div id="app">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
      <div class="max-w-md w-full space-y-8">
        <div>
          <h1 class="text-center text-6xl font-extrabold text-gray-900 dark:text-white">404</h1>
          <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">
            Page Not Found
          </h2>
          <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
            The page you are looking for does not exist.
          </p>
        </div>
        <div class="flex justify-center">
          <a href="/" class="btn bg-primary hover:bg-primary-dark text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
            Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
